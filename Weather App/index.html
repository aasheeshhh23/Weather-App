<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>

    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0&"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="Container">
      <!-- Search-section -->
      <div class="Search-section">
        <div class="Input-Wrapper">
          <span class="material-symbols-rounded">search</span>
          <input
            type="search"
            placeholder="Enter a city name"
            class="search-input"
          />
        </div>
        <button class="location-button">
          <span class="material-symbols-rounded">my_location</span>
        </button>
      </div>

      <!-- No result message -->
      <div class="no-result">
        <img src="icons/no-result.svg" class="weather-icon" />
        <h3 class="tittle">Something went wrong</h3>
        <p class="message">
          we're unable to retreve the weather details. ensure that you entered a
          valid city name or try again later.
        </p>
      </div>

      <!-- Weather-Section -->
      <div class="Weather-Section">
        <!-- current-Weather -->
        <div class="current-Weather">
          <img src="icons/clouds.svg" class="weather-icon" />
          <h2 class="temperature">00<span>°C</span></h2>
          <p class="description">Weather-description</p>
        </div>
        <!-- Hourly-Weather Forcast list -->
        <div class="hourly-weather">
          <ul class="weather-list"></ul>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
